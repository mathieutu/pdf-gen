name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag commit belongs to main history
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is not reachable from origin/main"
            exit 1
          fi

  ci:
    name: Checks on release
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Docker Build & Push
    needs: [verify-tag-on-main, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/mathieutu/pdf-gen
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attach Docker image info to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pull_commands=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/^/docker pull /')
          current_notes=$(gh release view "${{ github.ref_name }}" --json body --jq .body)
          {
            printf '%s\n\n' "$current_notes"
            printf '### Docker image\n\n```bash\n%s\n```\n' "$pull_commands"
          } > release_notes.md
          gh release edit "${{ github.ref_name }}" --notes-file release_notes.md
